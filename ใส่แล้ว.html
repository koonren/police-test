        // ============================================================

        let selectedQuestions = [];
        let currentIdx = 0;
        let userAnswers = {};
        let timeLeft = myQuizData.examTimeSeconds;
        let timerInterval;
        let isPaused = false;

        // ตั้งค่าหน้าแรก
        document.getElementById('main-title').innerText = myQuizData.examTitle;
        document.getElementById('main-subtitle').innerText = myQuizData.examSubtitle;

        function prepareQuiz() {
            const name = document.getElementById('user-name').value;
            if(!name) return alert("กรุณากรอกชื่อก่อนเริ่มครับ");
            selectedQuestions = [...myQuizData.questions].sort(() => Math.random() - 0.5).slice(0, 150);
            document.getElementById('display-name').innerText = name;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            startTimer();
            showQuestion();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if(!isPaused) {
                    const mins = Math.floor(timeLeft / 60);
                    const secs = timeLeft % 60;
                    document.getElementById('timer-box').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                    if (timeLeft-- <= 0) { clearInterval(timerInterval); showResult(); }
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-screen').classList.toggle('hidden');
        }

        function showQuestion() {
            const data = selectedQuestions[currentIdx];
            document.getElementById('q-number').innerText = `ข้อที่ ${currentIdx + 1}/150`;
            document.getElementById('q-subject').innerText = data.subject || "";
            document.getElementById('q-text').innerText = data.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            data.options.forEach((optText) => {
                const isSelected = userAnswers[currentIdx] === optText;
                container.innerHTML += `<div onclick="selectOption('${optText}')" class="flex items-center border-2 ${isSelected ? 'border-red-500 bg-red-50 shadow-md ring-2 ring-red-100' : 'border-gray-100'} p-5 rounded-2xl cursor-pointer hover:bg-gray-50 transition transform ${isSelected ? 'scale-[1.01]' : ''}">
                    <div class="w-10 h-10 rounded-full border-2 flex items-center justify-center mr-4 ${isSelected ? 'bg-red-500 text-white border-red-500 shadow-lg' : 'border-gray-300 text-gray-400'} font-bold">${isSelected ? '✓' : ''}</div>
                    <span class="text-lg ${isSelected ? 'font-black text-red-900' : 'text-gray-700'}">${optText}</span>
                </div>`;
            });
            document.getElementById('next-btn').innerText = (currentIdx === selectedQuestions.length - 1) ? "ส่งข้อสอบ" : "ข้อถัดไป";
        }

        function selectOption(text) { userAnswers[currentIdx] = text; showQuestion(); }

        function nextQuestion() {
            if (currentIdx < selectedQuestions.length - 1) { currentIdx++; showQuestion(); window.scrollTo(0,0); }
            else { if(confirm("ยืนยันการส่งข้อสอบ?")) showResult(); }
        }

        function prevQuestion() { if (currentIdx > 0) { currentIdx--; showQuestion(); } }

        function showResult() {
            clearInterval(timerInterval);
            let score = 0;
            selectedQuestions.forEach((item, index) => { if(userAnswers[index] === item.answer) score++; });
            const isPass = score >= Math.ceil(selectedQuestions.length * (myQuizData.passPercent / 100));
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-score').style.color = isPass ? "#16a34a" : "#dc2626";
            document.getElementById('pass-status').innerText = isPass ? "ผ่านเกณฑ์ ✅" : "ไม่ผ่านเกณฑ์ ❌";
            document.getElementById('pass-status').className = isPass ? "text-green-700 bg-green-50 px-8 py-2 rounded-full border-green-200" : "text-red-700 bg-red-50 px-8 py-2 rounded-full border-red-200";
            document.getElementById('result-msg').innerText = `ทำได้ ${score} จาก 150 ข้อ`;
        }

        function renderReviewForm() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('review-screen').classList.remove('hidden');
            const list = document.getElementById('review-list');
            list.innerHTML = '';
            selectedQuestions.forEach((data, index) => {
                const userAns = userAnswers[index];
                const isCorrect = userAns === data.answer;
                const card = document.createElement('div');
                card.className = `bg-white p-6 rounded-3xl shadow-sm border-t-8 ${isCorrect ? 'border-green-500 bg-green-50/20' : 'border-red-500 bg-red-50/20'}`;
                
                let optionsHtml = '';
                data.options.forEach(opt => {
                    let style = "border-gray-100";
                    let icon = "○";
                    // กรณีตัวเลือกนี้คือข้อที่ถูกต้อง
                    if (opt === data.answer) { 
                        style = "border-green-500 bg-green-100 font-bold text-green-900"; 
                        icon = "✅"; 
                    }
                    // กรณีตัวเลือกนี้คือข้อที่ผู้ใช้ตอบผิด
                    else if (opt === userAns && !isCorrect) { 
                        style = "border-red-500 bg-red-100 font-bold text-red-900"; 
                        icon = "❌"; 
                    }
                    optionsHtml += `<div class="flex items-center border-2 ${style} p-4 rounded-xl mb-2 text-md"><span class="mr-3">${icon}</span> ${opt}</div>`;
                });

                // สร้างส่วนแสดงเฉลยด้านล่างแยกต่างหาก
                const answerFooter = `
                    <div class="mt-6 p-4 rounded-2xl bg-green-600 text-white shadow-md">
                        <p class="text-sm font-bold opacity-90">เฉลยคำตอบที่ถูกต้อง:</p>
                        <p class="text-lg font-black">${data.answer}</p>
                    </div>
                `;

                card.innerHTML = `
                    <div class="flex justify-between mb-2">
                        <span class="font-bold text-gray-400 italic">ข้อที่ ${index + 1}</span>
                        <span class="${isCorrect ? 'text-green-600' : 'text-red-600'} font-black italic">${isCorrect ? 'Correct' : 'Incorrect'}</span>
                    </div>
                    <p class="text-xl font-bold text-gray-800 mb-6 leading-tight">${data.question}</p>
                    <div class="space-y-1">${optionsHtml}</div>
                    ${answerFooter} 
                `;
                list.appendChild(card);
            });
            window.scrollTo(0,0);
        }
    </script>
